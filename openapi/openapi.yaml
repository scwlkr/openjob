                code:
                  const: group_not_found
    MemberNotFoundErrorEnvelope:
      allOf:
        - $ref: "#/components/schemas/ErrorEnvelope"
        - properties:
            error:
              properties:
                code:
                  const: member_not_found
    UserNotFoundErrorEnvelope:
      allOf:
        - $ref: "#/components/schemas/ErrorEnvelope"
        - properties:
            error:
              properties:
                code:
                  const: user_not_found
    BanNotFoundErrorEnvelope:
      allOf:
        - $ref: "#/components/schemas/ErrorEnvelope"
        - properties:
            error:
              properties:
                code:
                  const: ban_not_found
    TaskNotFoundErrorEnvelope:
      allOf:
        - $ref: "#/components/schemas/ErrorEnvelope"
        - properties:
            error:
              properties:
                code:
                  const: task_not_found
    InviteNotFoundErrorEnvelope:
